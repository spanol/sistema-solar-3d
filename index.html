<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Solar 3D</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="solar-canvas"></canvas>
      <div id="view-controls">
        <button id="ctrl-orbits" class="ctrl-toggle active" aria-pressed="true">⊙ Órbitas</button>
        <button id="ctrl-labels" class="ctrl-toggle active" aria-pressed="true">◉ Labels</button>
        <button id="ctrl-rotation" class="ctrl-toggle active" aria-pressed="true">▶ Rotação</button>
      </div>

      <div id="planet-card" class="hidden">
        <h2 id="card-name"></h2>
        <p id="card-description"></p>
        <div id="card-stats">
          <div class="stat-row">
            <span class="stat-label">Diâmetro</span>
            <span id="card-diameter" class="stat-value"></span>
          </div>
          <div class="stat-row" id="card-distance-row">
            <span class="stat-label">Dist. do Sol</span>
            <span id="card-distance" class="stat-value"></span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Duração do dia</span>
            <span id="card-day" class="stat-value"></span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Duração do ano</span>
            <span id="card-year" class="stat-value"></span>
          </div>
        </div>
        <p class="card-section-label">Curiosidades</p>
        <ul id="card-facts"></ul>

        <div id="card-calculators">
          <p class="card-section-label">Calculadoras</p>
          <div class="calc-block" id="calc-weight-block">
            <div class="calc-label">Peso neste corpo</div>
            <div class="calc-row">
              <input type="number" id="calc-weight-input" min="1" max="999" step="1" placeholder="seu peso (kg)" class="calc-input" />
              <span class="calc-arrow">→</span>
              <span class="calc-result" id="calc-weight-result">—</span>
            </div>
          </div>
          <div class="calc-block" id="calc-age-block">
            <div class="calc-label">Sua idade neste planeta</div>
            <div class="calc-row">
              <input type="date" id="calc-birth-input" class="calc-input calc-input-date" />
              <span class="calc-arrow">→</span>
              <span class="calc-result" id="calc-age-result">—</span>
            </div>
          </div>
          <div class="calc-block" id="calc-travel-block">
            <div class="calc-label">Tempo de viagem a 58.000 km/h</div>
            <div class="calc-result-travel" id="calc-travel-result">—</div>
          </div>
        </div>

        <div id="card-nav">
          <button id="card-prev" aria-label="Planeta anterior">&#8592; Anterior</button>
          <button id="card-next" aria-label="Próximo planeta">Próximo &#8594;</button>
        </div>
        <button id="card-close">← Voltar</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
